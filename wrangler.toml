name = "url-shortener"
main = "./dist/_worker.js/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Static assets (CSS, favicon, robots.txt, ads.txt, etc.) are served directly
# by Cloudflare's asset layer; any request that doesn't match an asset falls
# through to the Astro SSR worker above.
[assets]
binding = "ASSETS"
directory = "./dist"

# Cloudflare D1 database binding.
# 1. Create the database:   wrangler d1 create url_shortener
# 2. The returned database_id is set below.
# 3. Initialise the schema: npm run db:init:remote
[[d1_databases]]
binding = "DB"
database_name = "url_shortener"
database_id = "ef648fd8-d54c-400a-b66e-49ac1d644160"

[vars]
# Public site URL used for building short links and canonical/SEO tags.
PUBLIC_SITE_URL = "https://shr7.org"
# Your Google AdSense publisher ID, e.g. "ca-pub-1234567890123456".
# Leave empty to disable ads (no AdSense script is injected when empty).
PUBLIC_ADSENSE_CLIENT = ""
# Cloudflare Turnstile site key (public). Leave empty to disable the bot check.
PUBLIC_TURNSTILE_SITE_KEY = ""

# Secrets — DO NOT put these here. Set them with `wrangler secret put NAME`
# (or in the dashboard → Worker → Settings → Variables and Secrets):
#   TURNSTILE_SECRET_KEY   — Turnstile secret key (enables server-side bot check)
#   SAFE_BROWSING_API_KEY  — Google Safe Browsing API key (enables malware scan)
# When a secret is absent, that check is skipped so the app still runs.
